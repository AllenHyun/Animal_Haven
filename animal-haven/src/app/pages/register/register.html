<div class="page-container">

  <div class="register-card">

    <div class="card-left">

      <div class="circle-frame">

        <img [src]="'images/dog_register.png'" alt="Animal Haven">      </div>

    </div>

    <div class="card-right">

      <h1> CREATE YOUR ACCOUNT </h1>

      <p class="login-text"> Already have an <span>account?</span></p>

      <div class="input-group">

        <label>First name</label>
        <input type="text" placeholder="First name">

      </div>

      <div class="input-group">

        <label>Last name</label>
        <input type="text" placeholder="Last name">

      </div>

      <div class="input-group">

        <label>Email</label>
        <input type="text" placeholder="example_email@gmail.com">

      </div>

      <div class="input-group">

        <label>Password</label>
        <input type="password" placeholder="*************">

      </div>

      <div class="input-group">

        <label>Verify password</label>
        <input type="password" placeholder="*************">

      </div>

      <div class="input-group">

        <label>Postcode</label>
        <input type="text" placeholder="12345">

      </div>

      <div class="checkbox-group">

        <input type="checkbox" id="notifications">
        <label for="notifications"> I would like to receive notifications of new animals arrivals.</label>

      </div>

      <button class="create-button">CREATE</button>

    </div>

  </div>

</div>
