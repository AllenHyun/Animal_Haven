<div class="page-container">

  <div class="login-card">

    <div class="card-left">

      <h1> WELCOME BACK </h1>

      <p class="login-text"> <span>Sign up</span> if you don't have an account </p>

      <div class="input-login">

        <div class="input-group">

          <label>Email</label>
          <input type="text" placeholder="example_email@gmail.com">

        </div>

        <div class="input-group">

          <label>Password</label>
          <input type="password" placeholder="*************">

        </div>

        <div class="final-options">

          <div class="checkbox-group">

            <label for="notifications"> Remember me</label>
            <input type="checkbox" id="notifications">

          </div>

          <p class="forget-text">Forget password?</p>

        </div>

      </div>

      <button class="sign-in-button">SIGN IN</button>

    </div>

    <div class="card-right">

      <div class="circle-frame">

        <img [src]="'images/cat_login.png'" alt="Animal Haven">

      </div>

    </div>

  </div>

</div>
