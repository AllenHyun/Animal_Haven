<div>
  <section id="filter-container">
    <div class="filter-title">Filter by</div>
    <select name="animal" class="filter-pill">
      <option value="">Animal</option>
      @for (animal of animals; track animal) {
        <option [value]="animal">{{ animal }}</option>
      }
    </select>
    <select name="breed" class="filter-pill">
      <option value="">Breed</option>
      @for (breed of breeds; track breed) {
        <option [value]="breed">{{ breed }}</option>
      }
    </select>
    <select name="age" class="filter-pill">
      <option value="">Age</option>
      @for (age of ages; track age) {
        <option [value]="age">{{ age }} years old</option>
      }
    </select>
  </section>
  <section id="gallery">
    @for (pet of pets$ | async; track pet.id) {
      <app-card [data]="pet" (viewDetails)="selectedPet = $event"></app-card>
    } @empty {
      <h1>No items found in the database</h1>
    }
  </section>
</div>

@if (selectedPet) {
  <div id="details-overlay" (click)="selectedPet = null">
    <pet-profile [pet]="selectedPet" (close)="selectedPet = null"></pet-profile>
  </div>
}
