<div>
    <section id="filter-container">
        <div class="filter-pill filter-title">Filter by</div>
        <div class="filter-pill">Animal</div>
        <div class="filter-pill">Breed</div>
        <div class="filter-pill">Age</div>
    </section>
    <section id="gallery">
        @for (animal of animalTable; track animal.id) {
            <app-card [data]="animal" (viewDetails)="selectedPet = $event"></app-card>
        } @empty {
            <h1>No items found in the database</h1>
        }
    </section>    
</div>

@if (selectedPet) {
    <div id="details-overlay" (click)="selectedPet = null">
        <pet-profile [pet]="selectedPet" (close)="selectedPet = null"></pet-profile>
    </div>
}
